  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), accelerometer=()" />
  
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com https://www.googleapis.com https://*.googleapis.com https://*.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.googleapis.com;
    img-src 'self' data: https: http: https://*.googleusercontent.com https://*.gstatic.com;
    font-src 'self' https://fonts.gstatic.com https://*.gstatic.com data:;
    connect-src 'self' https://accounts.google.com https://www.googleapis.com https://*.googleapis.com https://*.gstatic.com ws: wss:;
    frame-src 'self' https://accounts.google.com https://*.google.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    upgrade-insecure-requests;
  " />
  
  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://apis.google.com" />
  <link rel="preconnect" href="https://accounts.google.com" />

  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="dns-prefetch" href="https://apis.google.com" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

      Object.defineProperty(window, 'console', {
        value: console,
        writable: false,
        configurable: false
      });
